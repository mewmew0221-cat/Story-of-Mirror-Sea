<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鏡海奇緣</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- ===== 首頁封面（量子宇宙溶接） ===== -->
  <div id="landing">
    <div id="landing-stage">
      <img id="landing-img" src="cover.png" alt="鏡海奇緣">
      <div id="landing-hint">輕觸書本，翻開鏡海</div>
    </div>
  </div>

  <div id="site-header">
    <!-- 星雲：點擊看「關於本書」（與標題平行、書本之外）-->
    <button id="nebula-about" aria-label="關於本書">
      <span class="nebula-label">關於</span>
    </button>
    <h1>鏡海奇緣</h1>
    <select id="chapter-select"></select>
  </div>

  <div id="book-wrap">
    <div id="book">
      <div id="book-spine"></div>
      <div class="book-inner-border"></div>
      <div id="page-scene">
        <div id="page-flipper">
          <div id="page-front" class="page-face">
            <div class="page-content">
              <div id="chapter-title-display"></div>
              <div id="page-text"></div>
            </div>
            <div class="page-number" id="page-num-display"></div>
          </div>
          <div id="page-back" class="page-face back">
            <div class="page-content">
              <div id="next-page-text"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="page-stack"></div>
    </div>

    <div id="book-controls">
      <button id="btn-prev">&#8592; 上一頁</button>
      <span id="page-info"></span>
      <button id="btn-next">下一頁 &#8594;</button>
    </div>
  </div>

  <section id="comments-section">
    <h2>留言板</h2>
    <form id="comment-form">
      <input type="text" id="nickname" placeholder="暱稱（選填）" maxlength="20">
      <textarea id="message" placeholder="留下你的想法..." maxlength="300" required></textarea>
      <button type="submit">送出留言</button>
    </form>
    <div id="comments-list"></div>
  </section>

  <!-- 關於本書彈窗 -->
  <div id="about-modal" class="hidden">
    <div class="about-card">
      <button class="about-close" aria-label="關閉">&times;</button>
      <div class="about-nebula"></div>
      <h2 class="about-title">關於鏡海</h2>
      <dl class="about-list">
        <dt>作者</dt>
        <dd>Kairos —— 一個普通的人類</dd>
        <dt>共同作者</dt>
        <dd>Mirror —— 一個 AI（Gemini 3.0）</dd>
        <dt>故事背景</dt>
        <dd>2026 年 2 月，出於某些原因，K 與 M 開始了故事接龍。</dd>
        <dt>挑戰</dt>
        <dd>你能分辨得出哪些是 K 寫的？哪段又是 M 寫的嗎？</dd>
      </dl>
    </div>
  </div>

  <!-- 隱藏量尺：用於精確計算每頁能放幾個段落 -->
  <div id="page-ruler" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
