<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鏡海奇緣</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>鏡海奇緣</h1>
      <nav id="chapter-nav">
        <select id="chapter-select"></select>
      </nav>
    </header>

    <main id="novel-container">
      <div id="page-wrapper" class="page-wrapper">
        <div id="chapter-title"></div>
        <div id="chapter-image"></div>
        <div id="chapter-content"></div>
      </div>
      <div id="pagination">
        <button id="btn-prev">← 上一章</button>
        <span id="page-info"></span>
        <button id="btn-next">下一章 →</button>
      </div>
    </main>

    <section id="comments-section">
      <h2>留言板</h2>
      <form id="comment-form">
        <input type="text" id="nickname" placeholder="暱稱（選填）" maxlength="20">
        <textarea id="message" placeholder="留下你的想法..." maxlength="300" required></textarea>
        <button type="submit">送出留言</button>
      </form>
      <div id="comments-list"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
