<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鏡海奇緣</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div id="site-header">
    <h1>鏡海奇緣</h1>
    <select id="chapter-select"></select>
  </div>

  <div id="book-wrap">
    <div id="book">
      <div id="book-spine"></div>
      <div id="page-scene">
        <div id="page-flipper">
          <div id="page-front" class="page-face">
            <div class="page-content">
              <div id="chapter-title-display"></div>
              <div id="page-text"></div>
            </div>
            <div class="page-number" id="page-num-display"></div>
          </div>
          <div id="page-back" class="page-face back">
            <div class="page-content">
              <div id="next-page-text"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="page-stack"></div>
    </div>

    <div id="book-controls">
      <button id="btn-prev">&#8592; 上一頁</button>
      <span id="page-info"></span>
      <button id="btn-next">下一頁 &#8594;</button>
    </div>
  </div>

  <section id="comments-section">
    <h2>留言板</h2>
    <form id="comment-form">
      <input type="text" id="nickname" placeholder="暱稱（選填）" maxlength="20">
      <textarea id="message" placeholder="留下你的想法..." maxlength="300" required></textarea>
      <button type="submit">送出留言</button>
    </form>
    <div id="comments-list"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
